      github.com/OphidiaBigData/ophidia-workflow-catalogue flake8:
        commands:
        - /usr/bin/env sh .sqa/script.wisteria_realistic_donkey.sh
        container: qc.sty_mustard_zealous_tortoise
      github.com/OphidiaBigData/ophidia-workflow-catalogue jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.khaki_diplomatic_caribou.sh
        container: qc.sty_wave_empathetic_cobra
      github.com/OphidiaBigData/ophidia-workflow-catalogue pynblint.py:
        commands:
        - /usr/bin/env sh .sqa/script.sienna_sad_whale.sh
        container: qc.sty_lilac_honest_peacock
