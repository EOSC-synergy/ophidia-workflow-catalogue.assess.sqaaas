        commands:
        - /usr/bin/env sh .sqa/script.currant_funny_chameleon.sh
        container: qc.sty_royal_devoted_starfish
      github.com/OphidiaBigData/ophidia-workflow-catalogue pynblint.py:
        commands:
        - /usr/bin/env sh .sqa/script.rosewater_cheerful_sphinx.sh
        container: qc.sty_emerald_spirited_otter
