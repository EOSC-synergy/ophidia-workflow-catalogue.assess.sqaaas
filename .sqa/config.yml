config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/OphidiaBigData/ophidia-workflow-catalogue:
      branch: master
      repo: https://github.com/OphidiaBigData/ophidia-workflow-catalogue
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/OphidiaBigData/ophidia-workflow-catalogue git:
        commands:
        - /usr/bin/env sh .sqa/script.freaky-brown-squirrel.sh
        container: qc.acc_shaky-amber-wildebeest
  QC.Doc:
    repos:
      github.com/OphidiaBigData/ophidia-workflow-catalogue find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.lousy-gamboge-zebra.sh
        container: qc.doc_snippy-cyan-macaque
      github.com/OphidiaBigData/ophidia-workflow-catalogue git:
        commands:
        - /usr/bin/env sh .sqa/script.pretty-brass-quail.sh
        container: qc.doc_hasty-grey-sparrow
      github.com/OphidiaBigData/ophidia-workflow-catalogue markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.sloppy-chocolate-sheepdog.sh
        container: qc.doc_wheezy-viridian-monster
  QC.Lic:
    repos:
      github.com/OphidiaBigData/ophidia-workflow-catalogue licensee:
        commands:
        - /usr/bin/env sh .sqa/script.paltry-cerise-havanese.sh
        container: qc.lic_chummy-cinnamon-coyote
  QC.Sec:
    repos:
      github.com/OphidiaBigData/ophidia-workflow-catalogue bandit:
        commands:
        - /usr/bin/env sh .sqa/script.hazy-lilac-bison.sh
        container: qc.sec_messy-platinum-barnacle
  QC.Sty:
    repos:
      github.com/OphidiaBigData/ophidia-workflow-catalogue flake8:
        commands:
        - /usr/bin/env sh .sqa/script.wheezy-ultramarine-rabbit.sh
        container: qc.sty_cozy-emerald-cichlid
      github.com/OphidiaBigData/ophidia-workflow-catalogue jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.goopy-indigo-newfoundland.sh
        container: qc.sty_pasty-periwinkle-lobster
      github.com/OphidiaBigData/ophidia-workflow-catalogue pynblint.py:
        commands:
        - /usr/bin/env sh .sqa/script.goopy-pear-robin.sh
        container: qc.sty_nerdy-ivory-setter
  QC.Uni:
    repos:
      github.com/OphidiaBigData/ophidia-workflow-catalogue pytest:
        commands:
        - /usr/bin/env sh .sqa/script.clammy-asparagus-bandicoot.sh
        container: qc.uni_scanty-yellow-emu
  QC.Ver:
    repos:
      github.com/OphidiaBigData/ophidia-workflow-catalogue get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.shabby-green-dragon.sh
        container: qc.ver_sleazy-champagne-oyster
timeout: 5400
